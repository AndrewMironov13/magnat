const money = (n) => {
  n = Math.floor(n); const neg = n < 0; n = Math.abs(n); let out;
  if (n >= 1e15) out = (n/1e15).toFixed(2)+" квдрлн";
  else if (n >= 1e12) out = (n/1e12).toFixed(2)+" трлн";
  else if (n >= 1e9) out = (n/1e9).toFixed(2)+" млрд";
  else if (n >= 1e6) out = (n/1e6).toFixed(2)+" млн";
  else if (n >= 1e3) out = (n/1e3).toFixed(1)+"к";
  else out = n+" ₽";
  return (neg?"−":"")+out;
};

function netWorth(s){
  return s.cash + s.bankDeposit - s.loan +
    s.businesses.reduce((a,id)=>a+(BUSINESSES.find(b=>b.id===id)?.cost||0),0) +
    s.property.reduce((a,id)=>a+(PROPERTY.find(b=>b.id===id)?.cost||0),0) +
    s.luxury.reduce((a,id)=>a+(LUXURY.find(b=>b.id===id)?.cost||0),0) +
    s.pets.reduce((a,id)=>a+(PETS.find(b=>b.id===id)?.cost||0),0) +
    (s.air||[]).reduce((a,id)=>a+(AIR.find(b=>b.id===id)?.cost||0),0) +
    (s.sea||[]).reduce((a,id)=>a+(SEA.find(b=>b.id===id)?.cost||0),0) +
    Object.entries(s.workers||{}).reduce((a,[id,q])=>a+(WORKERS.find(w=>w.id===id)?.hire||0)*q,0) +
    s.cars.reduce((a,c)=>a+(CARS.find(x=>x.id===c.carId)?.cost||0),0);
}

        let health=p.health; if(T)health=Math.min(100,health+1);
        // автопилот работы: зарабатывает сам, но меньше и тратит силы
        let autoCash=0,autoXp=0;
        if(p.autoWork&&p.job&&energy>=8){const j=JOBS.find(x=>x.id===p.job);if(j){autoCash=Math.floor(j.pay*0.35);autoXp=Math.max(1,Math.floor(j.xp*0.4));energy=Math.max(0,energy-2);hunger=Math.max(0,hunger-1.5);}}
        if(hunger<15)health=Math.max(0,health-2); if(energy<10)health=Math.max(0,health-1.5);
        // износ бизнесов: без поддержки состояние падает, доход снижается
        let bizCond={...(p.bizCond||{})};
        new Set(p.businesses).forEach(id=>{bizCond[id]=Math.max(0,(bizCond[id]??100)-0.35);});
        // экономический цикл плавает сам
        let econPhase=p.econPhase??2;
        if(Math.random()<0.06){econPhase+=Math.random()<0.5?-1:1;econPhase=Math.max(0,Math.min(4,econPhase));}
        // кредит: растёт на 22%/тик, но с потолком в 2× от взятого; при просрочке коллекторы забирают 70% дохода
        let loan=p.loan||0;
        const cap=Math.floor((p.loanPrincipal||0)*LOAN_CAP_MULT);
        if(loan>0&&(cap<=0||loan<cap))loan=Math.floor(loan*(1+LOAN_RATE));
        if(cap>0)loan=Math.min(loan,cap);
        let loanDue=loan>0?(p.loanDue||0)+1:0;
        let cashGain=income+autoCash;
        if(loan>0&&loanDue>LOAN_GRACE&&income>0){const seize=Math.floor(income*0.7);cashGain=income-seize+autoCash;loan=Math.max(0,loan-seize);if(loan<=0)loanDue=0;}
        let loanPrincipal=loan<=0?0:(p.loanPrincipal||0);
        return {...p,cash:Math.max(0,p.cash+cashGain),xp:p.xp+autoXp,day:p.day+1,age:18+Math.floor((p.day+1)/90),hunger,energy,health,bankDeposit:Math.floor(p.bankDeposit*1.002),loan,loanDue,loanPrincipal,econPhase,bizCond};
      });
      setHist(h=>{const sn=snapRef.current;const push=(arr,v)=>{const a=[...arr,v];return a.length>48?a.slice(a.length-48):a;};return {nw:push(h.nw,sn.nw),port:push(h.port,sn.port)};});
    },3000);
    return ()=>clearInterval(timer.current);
  },[started,income]);

  useEffect(()=>{
    if(!started) return;
    const na=ACHIEVEMENTS.filter(a=>!s.achievements.includes(a.id)&&a.check(s));
    if(na.length){ setS(p=>({...p,achievements:[...p.achievements,...na.map(a=>a.id)]})); notify("🏆 "+na[0].name); }
  },[s.cash,s.cars,s.businesses,s.married,s.kids,s.luxury,s.countries,s.pets,s.education,s.job,s.stats,s.workers,s.air,s.sea,s.love,s.age]);

  const notify=(t)=>{setFlash(t);setTimeout(()=>setFlash(null),1600);};
  const addLog=(t)=>setS(p=>({...p,log:[t,...p.log].slice(0,40)}));

  const work=()=>{ if(!s.job)return notify("Устройся на работу"); if(s.energy<15)return notify("Нет сил 😴"); const j=JOBS.find(x=>x.id===s.job); setS(p=>({...p,cash:p.cash+j.pay,xp:p.xp+j.xp,energy:Math.max(0,p.energy-12),hunger:Math.max(0,p.hunger-8)})); notify("+"+j.pay+" ₽"); addLog(`💼 ${j.name} (+${j.pay} ₽)`); };
  const sleep=()=>{setS(p=>({...p,energy:100}));notify("Выспался 😴");};
  const eat=()=>{if(s.cash<100)return notify("Не хватает");setS(p=>({...p,cash:p.cash-100,hunger:100,health:Math.min(100,p.health+5)}));notify("Поел 🍔");};
  const takeJob=(j)=>{if(s.xp<j.need)return notify(`Нужно ${j.need} опыта`);setS(p=>({...p,job:j.id}));notify("Работа: "+j.name);addLog(`📈 ${j.name}`);};
  const study=(e)=>{if(s.cash<e.cost)return notify("Не хватает");if(s.education.includes(e.id))return notify("Пройдено");setS(p=>({...p,cash:p.cash-e.cost,xp:p.xp+e.xp,education:[...p.education,e.id]}));notify("+"+e.xp+" опыта 🎓");addLog(`🎓 ${e.name}`);};

  const bizCount=(id)=>s.businesses.filter(x=>x===id).length;
  const buyBiz=(b)=>{ const cnt=bizCount(b.id); if(cnt>=BIZ_LIMIT)return notify("Максимум "+BIZ_LIMIT+" шт"); const price=bizPrice(b.cost,cnt); if(s.cash<price)return notify("Не хватает: "+money(price)); if(b.needCar&&s.cars.length===0)return notify("🔒 Нужна машина"); if(b.needProp&&s.property.length===0)return notify("🔒 Нужна недвижимость"); setS(p=>({...p,cash:p.cash-price,businesses:[...p.businesses,b.id],bizCond:{...(p.bizCond||{}),[b.id]:100}}));notify("Открыт: "+b.name);addLog(`🏭 ${b.name} (${money(price)})`); };
  // поддержать бизнес: восстановить состояние до 100 (стоит доля от суммарной цены копий)
  const supportBiz=(b)=>{ const cnt=bizCount(b.id); if(!cnt)return; const cond=(s.bizCond||{})[b.id]??100; if(cond>=99)return notify("Бизнес и так в порядке"); const cost=Math.floor(b.cost*cnt*0.4*(1-cond/100)); if(s.cash<cost)return notify("Не хватает: "+money(cost)); setS(p=>({...p,cash:p.cash-cost,bizCond:{...(p.bizCond||{}),[b.id]:100}}));notify("💪 "+b.name+" в форме"); };
  const hireStaff=(st)=>{if(s.cash<st.cost)return notify("Не хватает");setS(p=>({...p,cash:p.cash-st.cost,staff:[...p.staff,st.id]}));notify("Нанят: "+st.name);addLog(`🤝 ${st.name}`);};
  const hireWorker=(w)=>{if(s.cash<w.hire)return notify("Не хватает на найм");setS(p=>{const cur={...(p.workers||{})};cur[w.id]=(cur[w.id]||0)+1;return{...p,cash:p.cash-w.hire,workers:cur};});notify("Нанят: "+w.name);addLog(`🧑‍💼 Нанят ${w.name}`);};
  const fireWorker=(w)=>{setS(p=>{const cur={...(p.workers||{})};if(!cur[w.id])return p;cur[w.id]-=1;if(cur[w.id]<=0)delete cur[w.id];return{...p,workers:cur};});notify("Уволен: "+w.name);};
  const buyItem=(item,kind)=>{if(s.cash<item.cost)return notify("Не хватает");setS(p=>{const n={...p,cash:p.cash-item.cost,joy:Math.min(100,p.joy+item.joy)};if(kind==="prop")n.property=[...p.property,item.id];if(kind==="lux")n.luxury=[...p.luxury,item.id];if(kind==="pet")n.pets=[...p.pets,item.id];if(kind==="country")n.countries=[...p.countries,item.id];if(kind==="air")n.air=[...(p.air||[]),item.id];if(kind==="sea")n.sea=[...(p.sea||[]),item.id];return n;});notify("Куплено: "+item.name);addLog(`🛒 ${item.name}`);};
  const buyCar=(c)=>{if(s.cash<c.cost)return notify("Не хватает");setS(p=>({...p,cash:p.cash-c.cost,cars:[...p.cars,{carId:c.id,paint:c.base,upgrades:[]}],joy:Math.min(100,p.joy+c.joy)}));notify("В гараже: "+c.brand);addLog(`🏎️ ${c.brand} ${c.model}`);};
  const paintCar=(i,color)=>setS(p=>{const cars=[...p.cars];cars[i]={...cars[i],paint:color};return{...p,cars};});
  const upgradeCar=(i,up)=>{const car=s.cars[i];const base=CARS.find(c=>c.id===car.carId);if(car.upgrades.includes(up.id))return notify("Уже стоит");const cost=Math.floor(base.cost*up.costMul);if(s.cash<cost)return notify("Не хватает: "+money(cost));setS(p=>{const cars=[...p.cars];cars[i]={...cars[i],upgrades:[...cars[i].upgrades,up.id]};return{...p,cash:p.cash-cost,cars,joy:Math.min(100,p.joy+up.joy)};});notify(up.name+" "+up.emoji);};

  const goDate=(d)=>{if(s.cash<d.cost)return notify("Не хватает");setS(p=>{const love=Math.min(100,p.love+d.love);return{...p,cash:p.cash-d.cost,love,partner:love>=30||p.partner,joy:Math.min(100,p.joy+4)};});notify(d.name+" "+d.emoji);addLog(`❤️ ${d.name}`);};

  const liveDay=()=>{if(s.energy<10)return notify("Нет сил на приключения 😴");const e=pick(EVENTS);setS(p=>({...p,cash:Math.max(0,p.cash+(e.money||0)),energy:Math.max(0,Math.min(100,p.energy-8+(e.energy||0))),hunger:Math.max(0,p.hunger-5),joy:Math.max(0,Math.min(100,p.joy+(e.joy||0))),health:Math.max(0,Math.min(100,p.health+(e.health||0)))}));notify(e.t+(e.money?(e.money>0?" +"+money(e.money):" "+money(e.money)):""));addLog("🎲 "+e.t+(e.money?` (${e.money>0?"+":""}${money(e.money)})`:""));};

  // Консоль браузера: mg(321)=+1млн, mg(3211)=+1млрд, mg(32111)=+1трлн, mg(1234)=+10000 опыта,
  // mg(9999)=погасить долг, mg(7777)=восстановить здоровье/энергию/сытость/счастье, mg(5555)=+50 отношений
  const applyCheat=(code)=>{code=Number(code);
    if(code===321){setS(p=>({...p,cash:p.cash+1e6}));notify("· +1 млн ·");}
    else if(code===3211){setS(p=>({...p,cash:p.cash+1e9}));notify("· +1 млрд ·");}
    else if(code===32111){setS(p=>({...p,cash:p.cash+1e12}));notify("· +1 трлн ·");}
    else if(code===321111){setS(p=>({...p,cash:p.cash+1e15}));notify("· +1 квдрлн ·");}
    else if(code===1234){setS(p=>({...p,xp:p.xp+10000}));notify("· +10000 опыта ·");}
    else if(code===9999){setS(p=>({...p,loan:0,loanDue:0,loanPrincipal:0}));notify("· долг обнулён ·");}
    else if(code===7777){setS(p=>({...p,health:100,energy:100,hunger:100,joy:100}));notify("· статы восстановлены ·");}
    else if(code===5555){setS(p=>({...p,love:Math.min(100,p.love+50)}));notify("· +50 отношений ·");}
    else return "неизвестный код";
    return "ok";
  };
  const cheatRef=useRef(applyCheat); cheatRef.current=applyCheat;
  useEffect(()=>{ window.mg=(c)=>cheatRef.current(c); return ()=>{ try{delete window.mg;}catch(e){} }; },[]);
  // Секретный жест на телефоне: быстрые тапы по своей аватарке в шапке
  const tapRef=useRef({n:0,t:0});
  const secretTap=()=>{const now=Date.now();const st=tapRef.current;if(now-st.t>1400)st.n=0;st.t=now;st.n++;
    if(st.n===5)applyCheat(321); else if(st.n===10)applyCheat(3211); else if(st.n===15){applyCheat(32111);st.n=0;}};

  const buyAsset=(x,kind)=>{const price=prices[x.id];const key=kind==="stock"?"stocks":"crypto";let n=mktQty==="max"?Math.floor(s.cash/price):mktQty;if(price>s.cash)return notify("Не хватает даже на 1");if(price*n>s.cash)n=Math.floor(s.cash/price);if(n<1)return notify("Не хватает");setS(p=>{const cur={...p[key]};cur[x.id]=(cur[x.id]||0)+n;return{...p,cash:p.cash-price*n,[key]:cur};});notify(`Куплено ${n}× ${x.name}`);};
  const sellAsset=(x,kind)=>{const key=kind==="stock"?"stocks":"crypto";const owned=s[key][x.id]||0;if(!owned)return notify("Нечего продавать");const price=prices[x.id];const n=mktQty==="max"?owned:Math.min(mktQty,owned);setS(p=>{const cur={...p[key]};cur[x.id]-=n;if(cur[x.id]<=0)delete cur[x.id];return{...p,cash:p.cash+price*n,[key]:cur};});notify(`Продано ${n}× +${money(price*n)}`);};

  const deposit=(amt)=>{if(s.cash<amt)return notify("Не хватает");setS(p=>({...p,cash:p.cash-amt,bankDeposit:p.bankDeposit+amt}));notify("На вклад: "+money(amt));};
  const withdraw=()=>{if(s.bankDeposit<=0)return notify("Вклад пуст");setS(p=>({...p,cash:p.cash+p.bankDeposit,bankDeposit:0}));notify("Снято");};
  const takeLoan=(amt)=>{if(s.loan+amt>creditLimit)return notify("Кредитный лимит: "+money(creditLimit));setS(p=>({...p,cash:p.cash+amt,loan:p.loan+amt,loanPrincipal:(p.loanPrincipal||0)+amt}));notify("Кредит +"+money(amt));addLog(`🏦 Кредит ${money(amt)} (лимит ${money(creditLimit)})`);};
  const takeLoanInput=()=>{const amt=Math.floor(parseFloat(String(loanInput).replace(/[\s ]/g,"").replace(",",".")));if(!amt||amt<=0)return notify("Введи сумму кредита");if(s.loan+amt>creditLimit)return notify("Кредитный лимит: "+money(creditLimit));takeLoan(amt);setLoanInput("");};
  const payLoan=()=>{if(s.loan<=0)return notify("Долгов нет");const pay=Math.min(s.cash,s.loan);if(pay<=0)return notify("Нет денег");setS(p=>{const loan=p.loan-pay;return{...p,cash:p.cash-pay,loan,loanDue:loan<=0?0:p.loanDue,loanPrincipal:loan<=0?0:(p.loanPrincipal||0)};});notify("Погашено "+money(pay));};
  const toggleAuto=()=>{if(!s.job)return notify("Сначала устройся на работу");setS(p=>({...p,autoWork:!p.autoWork}));notify(s.autoWork?"Автопилот выключен":"⚙️ Автопилот работы включён");};

  const casino=(bet,type)=>{if(s.cash<bet)return notify("Не хватает");let win=0,msg="";if(type==="coin"){win=Math.random()<0.5?bet*2:0;msg=win?"Орёл! 🪙":"Решка";}if(type==="dice"){const d=Math.ceil(Math.random()*6);win=d>=5?bet*3:0;msg=`Кости: ${d}. `+(win?"Куш!":"Мимо");}if(type==="slot"){const r=Math.random();win=r<0.05?bet*20:r<0.2?bet*3:0;msg=win>=bet*20?"🎰 ДЖЕКПОТ!":win?"🎰 Выигрыш!":"🎰 Пусто";}setS(p=>({...p,cash:p.cash-bet+win,joy:win?Math.min(100,p.joy+3):Math.max(0,p.joy-2),stats:{...p.stats,casinoWins:p.stats.casinoWins+(win?1:0)}}));notify(msg+(win?" +"+money(win):""));addLog(`🎰 ${msg}`);};
  const doCrime=(c)=>{const risk=c.risk-(s.staff.includes("lawyer")?0.15:0)-(s.staff.includes("security")?0.1:0);if(Math.random()>risk){const loot=Math.floor(rnd(c.min,c.max));setS(p=>({...p,cash:p.cash+loot,stats:{...p.stats,crimes:p.stats.crimes+1}}));notify("✅ +"+money(loot));addLog(`🥷 ${c.name}: +${money(loot)}`);}else{const fine=Math.floor(rnd(c.min,c.max)*0.7);setS(p=>({...p,cash:Math.max(0,p.cash-fine),health:Math.max(0,p.health-10)}));notify("🚓 −"+money(fine));addLog(`🚓 ${c.name}: провал`);}};

  const exportSave=()=>{ const code=btoa(unescape(encodeURIComponent(JSON.stringify({s,started:true})))); setSaveCode(code); setSaveModal(true); };
  const importSave=()=>{ try{ const data=JSON.parse(decodeURIComponent(escape(atob(saveCode.trim())))); setS({...START,...data.s,stats:{...START.stats,...(data.s.stats||{})}}); setStarted(true); setSaveModal(false); notify("Сейв загружен ✅"); }catch(e){ notify("Неверный код сейва"); } };

  // ==== СТАРТ ====
  if(!started){
    return (<div style={S.wrap}><div style={S.startCard}>
      <div style={S.logo}>♛</div><h1 style={S.title}>МАГНАТ</h1><p style={S.sub}>Построй империю. Стань легендой.</p>
      <input style={S.input} placeholder="Имя героя" value={nameInput} onChange={e=>setNameInput(e.target.value)} />
      <div style={S.avatarPickRow}>{HAIR.map((h,i)=><button key={i} onClick={()=>setAvatarPick(i)} style={{...S.avatarChip,...(avatarPick===i?S.avatarChipOn:{})}}>{h}</button>)}</div>
      <div style={S.avatarLbl}>{HAIR_LBL[avatarPick]}</div>
      <button style={S.bigBtn} onClick={()=>{setS({...START,name:nameInput||"Игрок",avatar:avatarPick});setStarted(true);}}>Начать →</button>
      <button style={{...S.bigBtn,marginTop:10,background:"#161a33",color:gold}} onClick={()=>{setSaveCode("");setSaveModal(true);}}>Загрузить сейв (код)</button>
      <p style={S.hint}>Работа, 60 бизнесов в 8 тирах, наёмный штат с зарплатами, авиация и морской флот, акции, крипта, банк с крупными кредитами, казино, тёмные дела, семья, питомцы, путешествия, тюнинг машин. Прогресс сохраняется автоматически.</p>
      {saveModal && <SaveBox code={saveCode} setCode={setSaveCode} onImport={importSave} onClose={()=>setSaveModal(false)} mode="import" />}
    </div></div>);
  }
  if(s.health<=0){
    return (<div style={S.wrap}><div style={S.startCard}>
      <div style={{...S.logo,background:"#7a1f2b"}}>†</div><h1 style={S.title}>КОНЕЦ</h1><p style={S.sub}>{s.name}, {s.age} лет</p>
      <div style={S.statBig}>{money(netWorth(s))}</div><p style={S.hint}>Капитал · достижений {s.achievements.length}/{ACHIEVEMENTS.length}</p>
      <button style={S.bigBtn} onClick={()=>{setS(START);setStarted(false);}}>Заново</button>
    </div></div>);
  }

  const nw=netWorth(s);
  const portfolioVal=Object.entries(s.stocks).reduce((a,[id,q])=>a+prices[id]*q,0)+Object.entries(s.crypto).reduce((a,[id,q])=>a+prices[id]*q,0);
  snapRef.current={nw,port:portfolioVal}; // снимок для истории графиков

  return (<div style={S.wrap}><div style={S.app}>
    <div style={S.header}>
      <div style={S.avatarBox} onClick={secretTap}>{HAIR[s.avatar]}</div>
      <div style={{flex:1}}><div style={S.name}>{s.name}, {s.age}</div><div style={S.day}>День {s.day} · 🏆{s.achievements.length}</div></div>
      <div style={{textAlign:"right"}}><div style={S.cash}>{money(s.cash)}</div>{income!==0&&<div style={{...S.passive,color:income>0?"#5fbf8f":"#e0574e"}}>{income>0?"+":""}{money(income)}/час {income>0?"💤":"⚠️"}</div>}</div>
    </div>

function shade(hex,amt){let c=hex.replace("#","");if(c.length===3)c=c.split("").map(x=>x+x).join("");const num=parseInt(c,16);let r=(num>>16)+amt,g=((num>>8)&255)+amt,b=(num&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return"#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");}

function Chart({data,color,id,h}){
  h=h||64; color=color||"#8b5cf6"; const w=300;
  if(!data||data.length<2) return <div style={{height:h,display:"flex",alignItems:"center",justifyContent:"center",color:"#7c8aa5",fontSize:11.5}}>Данных пока мало — поиграй немного ⏳</div>;
  const min=Math.min(...data),max=Math.max(...data),span=(max-min)||1;
  const pts=data.map((v,i)=>[(i/(data.length-1))*w, h-4-((v-min)/span)*(h-10)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${w} ${h} L 0 ${h} Z`;
  const up=data[data.length-1]>=data[0]; const c=up?color:"#e0574e"; const gid="grad_"+id;
  return (<svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none" style={{display:"block"}}>
    <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={c} stopOpacity="0.35"/><stop offset="100%" stopColor={c} stopOpacity="0"/></linearGradient></defs>
    <path d={area} fill={`url(#${gid})`}/><path d={line} fill="none" stroke={c} strokeWidth="2.2" strokeLinejoin="round" strokeLinecap="round"/>
  </svg>);
}

function drawSideCar(ctx,x,y,w,color){
  const h=w*0.42, dark=shade(color,-40);
  ctx.fillStyle=dark; ctx.fillRect(x, y-h*0.5, w, h*0.55); // низ
  ctx.fillStyle=color; // кабина
  ctx.beginPath(); ctx.moveTo(x+w*0.18,y-h*0.5); ctx.lineTo(x+w*0.34,y-h); ctx.lineTo(x+w*0.72,y-h); ctx.lineTo(x+w*0.86,y-h*0.5); ctx.closePath(); ctx.fill();
  ctx.fillStyle="#bcd4e6"; ctx.fillRect(x+w*0.38,y-h*0.92,w*0.28,h*0.36); // окно
  ctx.fillStyle="#111"; const r=h*0.34;
  ctx.beginPath(); ctx.arc(x+w*0.26,y,r,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(x+w*0.74,y,r,0,7); ctx.fill();
  ctx.fillStyle=gold; ctx.beginPath(); ctx.arc(x+w*0.26,y,r*0.45,0,7); ctx.fill(); ctx.beginPath(); ctx.arc(x+w*0.74,y,r*0.45,0,7); ctx.fill();
}
function DriveGame({carDef,car,best,onExit,onEarn}){
  const cvRef=useRef(null); const stRef=useRef(null); const [runId,setRunId]=useState(0);
  const [hud,setHud]=useState({dist:0,coins:0}); const [over,setOver]=useState(null);
  const jump=()=>{const st=stRef.current; if(st&&!st.over&&st.y<=0.1){st.vy=15;st.y=0.01;}};
  useEffect(()=>{
    const cv=cvRef.current; if(!cv) return; const ctx=cv.getContext('2d');
    const baseSpeed=3.2 + carDef.speed/90 + (car.upgrades?car.upgrades.length:0)*0.5;
    const st={dist:0,coins:0,y:0,vy:0,over:false,obs:[],coins2:[],trees:[],scroll:0,tick:0}; stRef.current=st;
    let raf;
    function loop(){
      const W=cv.width=cv.clientWidth, H=cv.height=cv.clientHeight, gy=H-Math.max(70,H*0.28);
      st.tick++; st.dist+=baseSpeed; st.scroll=(st.scroll+baseSpeed)%44;
      st.vy-=0.8; st.y=Math.max(0,st.y+st.vy); if(st.y<=0)st.vy=0;
      if(st.tick%Math.max(28,70-Math.floor(st.dist/500))===0) st.obs.push({x:W+30,w:22+Math.random()*16,h:20+Math.random()*26,hit:false});
      if(st.tick%38===0) st.coins2.push({x:W+30,y:gy-30-Math.random()*90,got:false});
      if(st.tick%50===0) st.trees.push({x:W+40,s:0.6+Math.random()*0.9});
      st.obs.forEach(o=>o.x-=baseSpeed); st.coins2.forEach(c=>c.x-=baseSpeed); st.trees.forEach(t=>t.x-=baseSpeed*0.55);
      st.obs=st.obs.filter(o=>o.x>-50); st.coins2=st.coins2.filter(c=>c.x>-40); st.trees=st.trees.filter(t=>t.x>-70);
      const carX=W*0.16, carW=Math.min(78,W*0.16), carBottom=gy-st.y;
      st.obs.forEach(o=>{ if(!o.hit && o.x<carX+carW-12 && o.x+o.w>carX+12 && st.y<o.h){ o.hit=true; st.over=true; } });
      st.coins2.forEach(c=>{ if(!c.got && Math.abs(c.x-(carX+carW/2))<28 && Math.abs((carBottom-carW*0.2)-c.y)<46){ c.got=true; st.coins++; } });
      // фон
      const sky=ctx.createLinearGradient(0,0,0,H); sky.addColorStop(0,"#1b1040"); sky.addColorStop(1,"#3b1d6e"); ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
      ctx.fillStyle="#f4b942"; ctx.beginPath(); ctx.arc(W-60,54,24,0,7); ctx.fill();
      st.trees.forEach(t=>{const th=70*t.s; ctx.fillStyle="#6b3f1d"; ctx.fillRect(t.x-4*t.s,gy-th+14,8*t.s,th-14); ctx.fillStyle="#2f8a52"; ctx.beginPath(); ctx.arc(t.x,gy-th+14,24*t.s,0,7); ctx.fill();});
      ctx.fillStyle="#241a3a"; ctx.fillRect(0,gy+14,W,H); ctx.fillStyle="#3a2b5c"; ctx.fillRect(0,gy+10,W,6);
      ctx.fillStyle=gold; for(let x=-44+(44-st.scroll);x<W;x+=44) ctx.fillRect(x,gy+28,22,4);
      st.obs.forEach(o=>{ctx.fillStyle="#e0574e"; ctx.fillRect(o.x,gy+2-o.h,o.w,o.h); ctx.fillStyle="#7a1f2b"; ctx.fillRect(o.x,gy-2,o.w,4);});
      st.coins2.forEach(c=>{ if(c.got)return; ctx.fillStyle="#f4d03f"; ctx.beginPath(); ctx.arc(c.x,c.y,9,0,7); ctx.fill(); ctx.strokeStyle="#b8860b"; ctx.lineWidth=2; ctx.stroke(); });
      drawSideCar(ctx,carX,carBottom,carW,car.paint);
      if(!st.over){ if(st.tick%3===0)setHud({dist:Math.floor(st.dist/10),coins:st.coins}); raf=requestAnimationFrame(loop); }
      else { const dist=Math.floor(st.dist/10); const reward=dist*15+st.coins*800; onEarn(reward,dist); setOver({dist,coins:st.coins,reward}); }
    }
    raf=requestAnimationFrame(loop);
    return ()=>cancelAnimationFrame(raf);
  },[runId]);
  return (<div style={S.driveWrap}>
    <canvas ref={cvRef} onPointerDown={jump} style={{width:"100%",height:"100%",display:"block",touchAction:"none"}}/>
    <div style={S.driveHud}><span>🏁 {hud.dist} м</span><span>🪙 {hud.coins}</span><span style={{color:gold}}>рекорд {best||0} м</span></div>
    <div style={S.driveHint}>📱 переверни телефон · тапни по экрану — прыжок</div>
    <button style={S.driveExit} onClick={onExit}>✕</button>
    {over&&(<div style={S.driveOver}><div style={S.driveOverCard}>
      <div style={{fontSize:30}}>🏁</div><div style={{fontSize:20,fontWeight:800,color:gold,margin:"6px 0"}}>Заезд окончен</div>
      <div style={{fontSize:13,color:"#c6d0e6",lineHeight:1.7}}>Дистанция: <b>{over.dist} м</b><br/>Монеты: <b>{over.coins} 🪙</b><br/>Награда: <b style={{color:"#5fbf8f"}}>+{money(over.reward)}</b></div>
      <button style={{...S.bigBtn,marginTop:14}} onClick={()=>{setOver(null);setHud({dist:0,coins:0});setRunId(v=>v+1);}}>🔁 Ещё раз</button>
      <button style={{...S.bigBtn,marginTop:10,background:"#24304d",color:gold}} onClick={onExit}>Выйти из гаража</button>
    </div></div>)}
  </div>);
}
