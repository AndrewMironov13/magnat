const money = (n) => {
  n = Math.floor(n); const neg = n < 0; n = Math.abs(n); let out;
  if (n >= 1e15) out = (n/1e15).toFixed(2)+" квдрлн";
  else if (n >= 1e12) out = (n/1e12).toFixed(2)+" трлн";
  else if (n >= 1e9) out = (n/1e9).toFixed(2)+" млрд";
  else if (n >= 1e6) out = (n/1e6).toFixed(2)+" млн";
  else if (n >= 1e3) out = (n/1e3).toFixed(1)+"к";
  else out = n+" ₽";
  return (neg?"−":"")+out;
};

function netWorth(s){
  return s.cash + s.bankDeposit - s.loan +
    s.businesses.reduce((a,id)=>a+(BUSINESSES.find(b=>b.id===id)?.cost||0),0) +
    s.property.reduce((a,id)=>a+(PROPERTY.find(b=>b.id===id)?.cost||0),0) +
    s.luxury.reduce((a,id)=>a+(LUXURY.find(b=>b.id===id)?.cost||0),0) +
    s.pets.reduce((a,id)=>a+(PETS.find(b=>b.id===id)?.cost||0),0) +
    (s.air||[]).reduce((a,id)=>a+(AIR.find(b=>b.id===id)?.cost||0),0) +
    (s.sea||[]).reduce((a,id)=>a+(SEA.find(b=>b.id===id)?.cost||0),0) +
    Object.entries(s.workers||{}).reduce((a,[id,q])=>a+(WORKERS.find(w=>w.id===id)?.hire||0)*q,0) +
    s.cars.reduce((a,c)=>a+(CARS.find(x=>x.id===c.carId)?.cost||0),0);
}

const SAVE_KEY = "magnat_save_v3";
function saveGame(s, started){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({s,started})); }catch(e){} }
function loadGame(){ try{ const r = localStorage.getItem(SAVE_KEY); return r?JSON.parse(r):null; }catch(e){ return null; } }

  useEffect(()=>{ const r=loadGame(); if(r){ setS({...START,...r.s, stats:{...START.stats,...(r.s.stats||{})}}); setStarted(r.started); } },[]);

  const mgrBonus = 1 + (s.staff.includes("manager2")?0.15:0) + (s.staff.includes("coo")?0.2:0) + (s.staff.includes("cfo")?0.25:0) + (s.staff.includes("advisor")?0.4:0);
  const bizIncome = s.businesses.reduce((a,id)=>a+(BUSINESSES.find(x=>x.id===id)?.income||0),0);
  const salaryTotal = Object.entries(s.workers||{}).reduce((a,[id,q])=>a+(WORKERS.find(w=>w.id===id)?.salary||0)*q,0);
  const workerNet = Object.entries(s.workers||{}).reduce((a,[id,q])=>{const w=WORKERS.find(x=>x.id===id);return a+(w?(w.income-w.salary)*q:0);},0);
  const fleetIncome = (s.air||[]).reduce((a,id)=>a+(AIR.find(x=>x.id===id)?.income||0),0)+(s.sea||[]).reduce((a,id)=>a+(SEA.find(x=>x.id===id)?.income||0),0);
  const income = Math.floor(bizIncome*mgrBonus + workerNet + fleetIncome);

  useEffect(()=>{
    if(!started) return;
    timer.current = setInterval(()=>{
      setPrices(pr=>{const np={...pr};[...STOCKS,...CRYPTO].forEach(x=>{np[x.id]=Math.max(1,Math.round(pr[x.id]*(1+rnd(-x.vol,x.vol))));});return np;});
      setS(p=>{
        const A=p.staff.includes("assistant"),C=p.staff.includes("chef"),T=p.staff.includes("trainer");
        let hunger=C?Math.min(100,p.hunger+2):Math.max(0,p.hunger-1.2);
        let energy=A?Math.min(100,p.energy+2):Math.max(0,p.energy-0.6);
        let health=p.health; if(T)health=Math.min(100,health+1);
        if(hunger<15)health=Math.max(0,health-2); if(energy<10)health=Math.max(0,health-1.5);
        return {...p,cash:p.cash+income,day:p.day+1,age:18+Math.floor((p.day+1)/90),hunger,energy,health,bankDeposit:Math.floor(p.bankDeposit*1.002),loan:Math.floor(p.loan*1.004)};
      });
    },3000);
    return ()=>clearInterval(timer.current);
  },[started,income]);

  useEffect(()=>{
    if(!started) return;

  const work=()=>{ if(!s.job)return notify("Устройся на работу"); if(s.energy<15)return notify("Нет сил 😴"); const j=JOBS.find(x=>x.id===s.job); setS(p=>({...p,cash:p.cash+j.pay,xp:p.xp+j.xp,energy:Math.max(0,p.energy-12),hunger:Math.max(0,p.hunger-8)})); notify("+"+j.pay+" ₽"); addLog(`💼 ${j.name} (+${j.pay} ₽)`); };

  const buyAsset=(x,kind)=>{const price=prices[x.id];if(s.cash<price)return notify("Не хватает");setS(p=>{const key=kind==="stock"?"stocks":"crypto";const cur={...p[key]};cur[x.id]=(cur[x.id]||0)+1;return{...p,cash:p.cash-price,[key]:cur};});notify("Куплено: "+x.name);};
  const sellAsset=(x,kind)=>{const key=kind==="stock"?"stocks":"crypto";if(!s[key][x.id])return notify("Нечего продавать");const price=prices[x.id];setS(p=>{const cur={...p[key]};cur[x.id]-=1;if(cur[x.id]<=0)delete cur[x.id];return{...p,cash:p.cash+price,[key]:cur};});notify("Продано: +"+money(price));};

  const deposit=(amt)=>{if(s.cash<amt)return notify("Не хватает");setS(p=>({...p,cash:p.cash-amt,bankDeposit:p.bankDeposit+amt}));notify("На вклад: "+money(amt));};
  const withdraw=()=>{if(s.bankDeposit<=0)return notify("Вклад пуст");setS(p=>({...p,cash:p.cash+p.bankDeposit,bankDeposit:0}));notify("Снято");};
  const takeLoan=(amt)=>{setS(p=>({...p,cash:p.cash+amt,loan:p.loan+amt}));notify("Кредит +"+money(amt));addLog(`🏦 Кредит ${money(amt)}`);};
  const payLoan=()=>{if(s.loan<=0)return notify("Долгов нет");const pay=Math.min(s.cash,s.loan);if(pay<=0)return notify("Нет денег");setS(p=>({...p,cash:p.cash-pay,loan:p.loan-pay}));notify("Погашено "+money(pay));};

  const casino=(bet,type)=>{if(s.cash<bet)return notify("Не хватает");let win=0,msg="";if(type==="coin"){win=Math.random()<0.5?bet*2:0;msg=win?"Орёл! 🪙":"Решка";}if(type==="dice"){const d=Math.ceil(Math.random()*6);win=d>=5?bet*3:0;msg=`Кости: ${d}. `+(win?"Куш!":"Мимо");}if(type==="slot"){const r=Math.random();win=r<0.05?bet*20:r<0.2?bet*3:0;msg=win>=bet*20?"🎰 ДЖЕКПОТ!":win?"🎰 Выигрыш!":"🎰 Пусто";}setS(p=>({...p,cash:p.cash-bet+win,joy:win?Math.min(100,p.joy+3):Math.max(0,p.joy-2),stats:{...p.stats,casinoWins:p.stats.casinoWins+(win?1:0)}}));notify(msg+(win?" +"+money(win):""));addLog(`🎰 ${msg}`);};
  const doCrime=(c)=>{const risk=c.risk-(s.staff.includes("lawyer")?0.15:0)-(s.staff.includes("security")?0.1:0);if(Math.random()>risk){const loot=Math.floor(rnd(c.min,c.max));setS(p=>({...p,cash:p.cash+loot,stats:{...p.stats,crimes:p.stats.crimes+1}}));notify("✅ +"+money(loot));addLog(`🥷 ${c.name}: +${money(loot)}`);}else{const fine=Math.floor(rnd(c.min,c.max)*0.7);setS(p=>({...p,cash:Math.max(0,p.cash-fine),health:Math.max(0,p.health-10)}));notify("🚓 −"+money(fine));addLog(`🚓 ${c.name}: провал`);}};

  const exportSave=()=>{ const code=btoa(unescape(encodeURIComponent(JSON.stringify({s,started:true})))); setSaveCode(code); setSaveModal(true); };
  const importSave=()=>{ try{ const data=JSON.parse(decodeURIComponent(escape(atob(saveCode.trim())))); setS({...START,...data.s,stats:{...START.stats,...(data.s.stats||{})}}); setStarted(true); setSaveModal(false); notify("Сейв загружен ✅"); }catch(e){ notify("Неверный код сейва"); } };

  // ==== СТАРТ ====
  if(!started){
    return (<div style={S.wrap}><div style={S.startCard}>
      <div style={S.logo}>♛</div><h1 style={S.title}>МАГНАТ</h1><p style={S.sub}>Построй империю. Стань легендой.</p>
      <input style={S.input} placeholder="Имя героя" value={nameInput} onChange={e=>setNameInput(e.target.value)} />
      <div style={S.avatarPickRow}>{HAIR.map((h,i)=><button key={i} onClick={()=>setAvatarPick(i)} style={{...S.avatarChip,...(avatarPick===i?S.avatarChipOn:{})}}>{h}</button>)}</div>
      <div style={S.avatarLbl}>{HAIR_LBL[avatarPick]}</div>
      <button style={S.bigBtn} onClick={()=>{setS({...START,name:nameInput||"Игрок",avatar:avatarPick});setStarted(true);}}>Начать →</button>
      <button style={{...S.bigBtn,marginTop:10,background:"#15251e",color:gold}} onClick={()=>{setSaveCode("");setSaveModal(true);}}>Загрузить сейв (код)</button>
      <p style={S.hint}>Работа, 50 бизнесов, наёмный штат с зарплатами, авиация и морской флот, акции, крипта, банк, казино, тёмные дела, семья, питомцы, путешествия, тюнинг машин. Прогресс сохраняется автоматически.</p>
      {saveModal && <SaveBox code={saveCode} setCode={setSaveCode} onImport={importSave} onClose={()=>setSaveModal(false)} mode="import" />}
    </div></div>);
  }
  if(s.health<=0){
    return (<div style={S.wrap}><div style={S.startCard}>
      <div style={{...S.logo,background:"#7a1f2b"}}>†</div><h1 style={S.title}>КОНЕЦ</h1><p style={S.sub}>{s.name}, {s.age} лет</p>
      <div style={S.statBig}>{money(netWorth(s))}</div><p style={S.hint}>Капитал · достижений {s.achievements.length}/{ACHIEVEMENTS.length}</p>
      <button style={S.bigBtn} onClick={()=>{setS(START);setStarted(false);}}>Заново</button>
    </div></div>);
  }

  const nw=netWorth(s);
  const portfolioVal=Object.entries(s.stocks).reduce((a,[id,q])=>a+prices[id]*q,0)+Object.entries(s.crypto).reduce((a,[id,q])=>a+prices[id]*q,0);

  return (<div style={S.wrap}><div style={S.app}>
    <div style={S.header}>
      <div style={S.avatarBox}>{HAIR[s.avatar]}</div>
      <div style={{flex:1}}><div style={S.name}>{s.name}, {s.age}</div><div style={S.day}>День {s.day} · 🏆{s.achievements.length}</div></div>
      <div style={{textAlign:"right"}}><div style={S.cash}>{money(s.cash)}</div>{income>0&&<div style={S.passive}>+{money(income)}/час 💤</div>}</div>
    </div>
    <div style={S.stats}><Stat label="Здоровье" val={s.health} color="#e0574e"/><Stat label="Энергия" val={s.energy} color="#3fa7d6"/><Stat label="Сытость" val={s.hunger} color="#e8a13a"/><Stat label="Счастье" val={s.joy} color="#c9a227"/></div>
    {flash&&<div style={S.flash}>{flash}</div>}

    <div style={S.content}>
      {tab==="home"&&(<div>
        <SectionTitle>Действия</SectionTitle>
        <div style={S.actionGrid}>
          <ActBtn onClick={work} label="Работать" emoji="💼" sub={s.job?"+"+JOBS.find(j=>j.id===s.job).pay+" ₽":"нет работы"}/>
          <ActBtn onClick={sleep} label="Спать" emoji="😴" sub="энергия 100"/>
          <ActBtn onClick={eat} label="Поесть" emoji="🍔" sub="−100 ₽"/>
          <ActBtn onClick={liveDay} label="Случай" emoji="🎲" sub="что выпадет"/>
        </div>
        {income>0&&(<><SectionTitle>Пассивный доход</SectionTitle><div style={S.passiveCard}><div style={S.passiveBig}>+{money(income)}/час</div><div style={S.passiveLbl}>капает сам, даже когда игра закрыта</div></div></>)}
        {portfolioVal>0&&<div style={{...S.passiveCard,marginTop:8}}><div style={S.passiveBig}>{money(portfolioVal)}</div><div style={S.passiveLbl}>портфель акций и крипты</div></div>}
        <SectionTitle>Дневник</SectionTitle>
        <div style={S.log}>{s.log.length===0?<div style={S.logEmpty}>Пусто. Начни действовать →</div>:s.log.map((l,i)=><div key={i} style={S.logRow}>{l}</div>)}</div>
      </div>)}

      {tab==="career"&&(<div>
        <SectionTitle>Карьера · опыт {s.xp}</SectionTitle>
        {JOBS.map(j=>{const a=s.job===j.id,l=s.xp<j.need;return(<div key={j.id} style={{...S.row,...(a?S.rowActive:{})}}><div><div style={S.rowName}>{j.name} {a&&"✓"}</div><div style={S.rowSub}>{j.pay} ₽/смена · опыт {j.need}</div></div><button style={{...S.buyBtn,...(l?S.btnLock:{}),...(a?S.btnOwn:{})}} onClick={()=>!l&&!a&&takeJob(j)} disabled={l||a}>{a?"тут":l?"🔒":"занять"}</button></div>);})}
        <SectionTitle>Образование</SectionTitle>
        {EDUCATION.map(e=>{const d=s.education.includes(e.id);return(<div key={e.id} style={S.row}><div><div style={S.rowName}>{e.emoji} {e.name} {d&&"✓"}</div><div style={S.rowSub}>+{e.xp} опыта · {money(e.cost)}</div></div><button style={{...S.buyBtn,...(s.cash<e.cost?S.btnLock:{}),...(d?S.btnOwn:{})}} onClick={()=>!d&&study(e)} disabled={d}>{d?"есть":"учиться"}</button></div>);})}
        <SectionTitle>Персонал</SectionTitle>
        {STAFF.map(st=>{const o=s.staff.includes(st.id);return(<div key={st.id} style={S.row}><div><div style={S.rowName}>{st.emoji} {st.name} {o&&"✓"}</div><div style={S.rowSub}>{st.desc} · {money(st.cost)}</div></div><button style={{...S.buyBtn,...(s.cash<st.cost?S.btnLock:{}),...(o?S.btnOwn:{})}} onClick={()=>!o&&hireStaff(st)} disabled={o}>{o?"есть":"нанять"}</button></div>);})}
      </div>)}

      {tab==="biz"&&(<div>
        <SectionTitle>Империя · {income>0?"+"+money(income)+"/час":"начни строить"}</SectionTitle>
        <p style={S.tabHint}>Каждый бизнес можно купить до {BIZ_LIMIT} раз.</p>
        {[1,2,3,4,5,6,7].map(tier=>(<div key={tier}><div style={S.tierLbl}>{TIER_NAMES[tier]}</div>
          {BUSINESSES.filter(b=>b.tier===tier).map(b=>{const cnt=bizCount(b.id);const max=cnt>=BIZ_LIMIT;const lc=b.needCar&&s.cars.length===0,lp=b.needProp&&s.property.length===0,lock=lc||lp;
            return(<div key={b.id} style={S.row}><div><div style={S.rowName}>{b.emoji} {b.name} {cnt>0&&<span style={S.owned}>{cnt}/{BIZ_LIMIT}</span>}</div><div style={S.rowSub}>{lc?"🔒 нужна машина":lp?"🔒 нужна недвижимость":`+${money(b.income)}/час`} · {money(b.cost)}</div></div>
              <button style={{...S.buyBtn,...((s.cash<b.cost||lock||max)?S.btnLock:{})}} onClick={()=>buyBiz(b)}>{max?"макс":lock?"🔒":"открыть"}</button></div>);})}</div>))}
        <SectionTitle>Сотрудники · штат {Object.values(s.workers||{}).reduce((a,b)=>a+b,0)}</SectionTitle>
        <p style={S.tabHint}>Нанимай людей — каждый приносит доход, но ест зарплату. Зарплатный фонд: −{money(salaryTotal)}/час.</p>
        {WORKERS.map(w=>{const cnt=(s.workers||{})[w.id]||0;return(<div key={w.id} style={S.row}><div><div style={S.rowName}>{w.emoji} {w.name} {cnt>0&&<span style={S.owned}>×{cnt}</span>}</div><div style={S.rowSub}>+{money(w.income-w.salary)}/час чистыми · найм {money(w.hire)}</div></div><div style={{display:"flex",gap:6}}><button style={{...S.miniBtn,background:"#24382e",color:gold}} onClick={()=>fireWorker(w)}>−</button><button style={{...S.miniBtn,...(s.cash<w.hire?S.btnLock:{})}} onClick={()=>hireWorker(w)}>+</button></div></div>);})}
      </div>)}

      {tab==="cars"&&(<div>
        <SectionTitle>Гараж · {s.cars.length} авто</SectionTitle>
        {s.cars.length===0&&<p style={S.tabHint}>Гараж пуст. Купи машину ниже ↓</p>}
        <div style={S.garageGrid}>{s.cars.map((car,i)=>{const b=CARS.find(c=>c.id===car.carId);return(<button key={i} style={S.garageCard} onClick={()=>setGarageCar(i)}><CarSVG body={b.body} color={car.paint}/><div style={S.garageName}>{b.brand} {b.model}</div><div style={S.garageUp}>{car.upgrades.length>0?car.upgrades.map(u=>UPGRADES.find(x=>x.id===u).emoji).join(""):"тюнинг →"}</div></button>);})}</div>
        <SectionTitle>Автосалон</SectionTitle>
        {CARS.map(c=>(<div key={c.id} style={S.row}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:54}}><CarSVG body={c.body} color={c.base} small/></div><div><div style={S.rowName}>{c.brand} {c.model}</div><div style={S.rowSub}>⚡{c.speed} · {money(c.cost)}</div></div></div><button style={{...S.buyBtn,...(s.cash<c.cost?S.btnLock:{})}} onClick={()=>buyCar(c)}>купить</button></div>))}
      </div>)}

      {tab==="shop"&&(<div>
        <SectionTitle>🏡 Недвижимость</SectionTitle>{PROPERTY.map(b=><ShopRow key={b.id} item={b} owned={s.property.includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"prop")} extra={`+${b.joy} счастья`}/>)}
        <SectionTitle>💎 Роскошь</SectionTitle>{LUXURY.map(b=><ShopRow key={b.id} item={b} owned={s.luxury.includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"lux")} extra={`+${b.joy} счастья`}/>)}
        <SectionTitle>🐾 Питомцы</SectionTitle>{PETS.map(b=><ShopRow key={b.id} item={b} owned={s.pets.includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"pet")} extra={`+${b.joy} счастья`}/>)}
        <SectionTitle>🛩️ Авиация</SectionTitle>
        <p style={S.tabHint}>Личный воздушный флот: счастье + доход от аренды/чартера.</p>
        {AIR.map(b=><ShopRow key={b.id} item={b} owned={(s.air||[]).includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"air")} extra={`+${money(b.income)}/час · +${b.joy}☺`} ownTxt="в ангаре"/>)}
        <SectionTitle>🛥️ Флот</SectionTitle>
        <p style={S.tabHint}>Корабли и яхты: счастье + доход от чартера.</p>
        {SEA.map(b=><ShopRow key={b.id} item={b} owned={(s.sea||[]).includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"sea")} extra={`+${money(b.income)}/час · +${b.joy}☺`} ownTxt="в порту"/>)}
        <SectionTitle>✈️ Путешествия</SectionTitle>{COUNTRIES.map(b=><ShopRow key={b.id} item={b} owned={s.countries.includes(b.id)} cash={s.cash} onBuy={()=>buyItem(b,"country")} extra={`+${b.joy} счастья`} btnTxt="лететь" ownTxt="был"/>)}
      </div>)}

      {tab==="money"&&(<div>
        <div style={S.subTabs}>
          <SubTab active={moreTab==="stocks"} onClick={()=>setMoreTab("stocks")}>📈 Биржа</SubTab>
          <SubTab active={moreTab==="bank"} onClick={()=>setMoreTab("bank")}>🏦 Банк</SubTab>
          <SubTab active={moreTab==="casino"} onClick={()=>setMoreTab("casino")}>🎰 Казино</SubTab>
          <SubTab active={moreTab==="crime"} onClick={()=>setMoreTab("crime")}>🥷 Дела</SubTab>
        </div>
        {moreTab==="stocks"&&(<div>
          <SectionTitle>Акции</SectionTitle>
          {STOCKS.map(x=>{const o=s.stocks[x.id]||0;return(<div key={x.id} style={S.row}><div><div style={S.rowName}>{x.emoji} {x.name} {o>0&&<span style={S.owned}>×{o}</span>}</div><div style={S.rowSub}>{money(prices[x.id])} за шт</div></div><div style={{display:"flex",gap:6}}><button style={{...S.miniBtn,background:"#24382e",color:gold}} onClick={()=>sellAsset(x,"stock")}>−</button><button style={{...S.miniBtn,...(s.cash<prices[x.id]?S.btnLock:{})}} onClick={()=>buyAsset(x,"stock")}>+</button></div></div>);})}
          <SectionTitle>Криптовалюта</SectionTitle>
          {CRYPTO.map(x=>{const o=s.crypto[x.id]||0;return(<div key={x.id} style={S.row}><div><div style={S.rowName}>{x.emoji} {x.name} {o>0&&<span style={S.owned}>×{o}</span>}</div><div style={S.rowSub}>{money(prices[x.id])} за шт</div></div><div style={{display:"flex",gap:6}}><button style={{...S.miniBtn,background:"#24382e",color:gold}} onClick={()=>sellAsset(x,"crypto")}>−</button><button style={{...S.miniBtn,...(s.cash<prices[x.id]?S.btnLock:{})}} onClick={()=>buyAsset(x,"crypto")}>+</button></div></div>);})}
        </div>)}
        {moreTab==="bank"&&(<div>
          <SectionTitle>Вклад</SectionTitle>
          <div style={S.passiveCard}><div style={S.passiveBig}>{money(s.bankDeposit)}</div><div style={S.passiveLbl}>на вкладе · +0.2%/тик</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}><button style={S.wideBtn} onClick={()=>deposit(10000)}>Вложить 10к</button><button style={S.wideBtn} onClick={()=>deposit(Math.floor(s.cash))}>Вложить всё</button><button style={{...S.wideBtn,gridColumn:"1/3",background:"#24382e",color:gold}} onClick={withdraw}>Снять всё</button></div>
          <SectionTitle>Кредит</SectionTitle>
          <div style={S.passiveCard}><div style={{...S.passiveBig,color:s.loan>0?"#e0574e":"#5fbf8f"}}>{money(s.loan)}</div><div style={S.passiveLbl}>долг · +0.4%/тик</div></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}><button style={S.wideBtn} onClick={()=>takeLoan(50000)}>Взять 50к</button><button style={S.wideBtn} onClick={()=>takeLoan(1000000)}>Взять 1млн</button><button style={{...S.wideBtn,gridColumn:"1/3",background:"#3a2226",color:"#e8b4bb"}} onClick={payLoan}>Погасить</button></div>
        </div>)}
        {moreTab==="casino"&&(<div>
          <SectionTitle>Казино</SectionTitle>
          {[["coin","🪙 Монетка","×2 при орле"],["dice","🎲 Кости","×3 если 5-6"],["slot","🎰 Слоты","до ×20"]].map(([type,name,desc])=>(<div key={type} style={{...S.row,flexDirection:"column",alignItems:"stretch",gap:8}}><div><div style={S.rowName}>{name}</div><div style={S.rowSub}>{desc}</div></div><div style={{display:"flex",gap:6}}>{[1000,10000,100000,1000000].map(bet=><button key={bet} style={{...S.miniBtn,flex:1,...(s.cash<bet?S.btnLock:{})}} onClick={()=>casino(bet,type)}>{money(bet)}</button>)}</div></div>))}
        </div>)}
        {moreTab==="crime"&&(<div>
          <SectionTitle>Тёмные дела</SectionTitle>
          <p style={S.tabHint}>{s.staff.includes("lawyer")?"Юрист снижает риск ⚖️":"Найми юриста, чтобы реже попадаться."}</p>
          {CRIMES.map(c=>(<div key={c.id} style={S.row}><div><div style={S.rowName}>{c.emoji} {c.name}</div><div style={S.rowSub}>куш {money(c.min)}–{money(c.max)} · риск {Math.round(c.risk*100)}%</div></div><button style={S.buyBtn} onClick={()=>doCrime(c)}>рискнуть</button></div>))}
        </div>)}
      </div>)}

      {tab==="love"&&(<div>
        <SectionTitle>Личная жизнь</SectionTitle>
        <p style={S.tabHint}>{s.married?`В браке ❤️ · детей ${s.kids}`:s.partner?"Есть партнёр · отношения "+Math.round(s.love):"Пока один."}</p>
        {DATES.map(d=>(<div key={d.id} style={S.row}><div><div style={S.rowName}>{d.emoji} {d.name}</div><div style={S.rowSub}>{money(d.cost)} · +{d.love} отн.</div></div><button style={{...S.buyBtn,...(s.cash<d.cost?S.btnLock:{})}} onClick={()=>goDate(d)}>вперёд</button></div>))}
        <SectionTitle>Семья</SectionTitle>
        <div style={S.row}><div><div style={S.rowName}>💍 Свадьба</div><div style={S.rowSub}>80 отношений · 200к</div></div><button style={{...S.buyBtn,...(s.married?S.btnOwn:(s.love<80||s.cash<200000)?S.btnLock:{})}} onClick={()=>!s.married&&marry()} disabled={s.married}>{s.married?"в браке":"жениться"}</button></div>
        <div style={S.row}><div><div style={S.rowName}>👶 Ребёнок</div><div style={S.rowSub}>нужен брак · 50к</div></div><button style={{...S.buyBtn,...(!s.married||s.cash<50000?S.btnLock:{})}} onClick={haveKid}>+1</button></div>
      </div>)}

      {tab==="me"&&(<div>
        <div style={S.meHead}><div style={S.meAvatar}>{HAIR[s.avatar]}</div><div><div style={S.rowName}>{s.name}</div><div style={S.rowSub}>{s.age} лет · день {s.day}{s.married?" · в браке 💍":""}{s.kids?` · детей ${s.kids}`:""}</div></div></div>
        <SectionTitle>Внешность</SectionTitle>
        <div style={S.avatarPickRow}>{HAIR.map((h,i)=><button key={i} onClick={()=>setS(p=>({...p,avatar:i}))} style={{...S.avatarChip,...(s.avatar===i?S.avatarChipOn:{})}}>{h}</button>)}</div>
        <SectionTitle>Капитал</SectionTitle>
        <div style={S.passiveCard}><div style={S.passiveBig}>{money(nw)}</div><div style={S.passiveLbl}>чистая стоимость со всеми активами</div></div>
        <SectionTitle>Достижения · {s.achievements.length}/{ACHIEVEMENTS.length}</SectionTitle>
        <div style={S.achGrid}>{ACHIEVEMENTS.map(a=>{const g=s.achievements.includes(a.id);return(<div key={a.id} style={{...S.achBox,...(g?S.achGot:{})}}><div style={{fontSize:22,filter:g?"none":"grayscale(1) opacity(.4)"}}>{a.emoji}</div><div style={{...S.achLbl,color:g?gold:"#5f7268"}}>{a.name}</div></div>);})}</div>
        <SectionTitle>Нажито</SectionTitle>
        <div style={S.ownGrid}>
          <OwnBox label="Бизнесы" n={s.businesses.length} emoji="🏭"/><OwnBox label="Машины" n={s.cars.length} emoji="🏎️"/><OwnBox label="Недвижимость" n={s.property.length} emoji="🏡"/>
          <OwnBox label="Роскошь" n={s.luxury.length} emoji="💎"/><OwnBox label="Питомцы" n={s.pets.length} emoji="🐾"/><OwnBox label="Страны" n={s.countries.length} emoji="✈️"/>
          <OwnBox label="Персонал" n={s.staff.length} emoji="🤝"/><OwnBox label="Образование" n={s.education.length} emoji="🎓"/><OwnBox label="Опыт" n={s.xp} emoji="⭐"/>
          <OwnBox label="Штат" n={Object.values(s.workers||{}).reduce((a,b)=>a+b,0)} emoji="🧑‍💼"/><OwnBox label="Авиация" n={(s.air||[]).length} emoji="🛩️"/><OwnBox label="Флот" n={(s.sea||[]).length} emoji="🛥️"/>
        </div>
        <SectionTitle>Сохранение</SectionTitle>
        <p style={S.tabHint}>Прогресс сохраняется сам в этом браузере. Чтобы перенести на другой телефон или отдать другу — экспортируй код и дай ему вставить.</p>
        <button style={{...S.bigBtn,background:"#15251e",color:gold}} onClick={exportSave}>📤 Экспорт сейва (код)</button>
        <button style={{...S.bigBtn,marginTop:10,background:"#1a3327",color:"#5fbf8f"}} onClick={cheat}>💰 +1 млн ₽ и +500 опыта</button>
        <button style={{...S.bigBtn,marginTop:10,background:"#3a2226",color:"#e8b4bb"}} onClick={()=>{if(confirm("Начать заново? Прогресс сотрётся."))
{setS(START);setStarted(false);}}}>Начать заново</button>
      </div>)}
    </div>

    {garageCar!==null&&s.cars[garageCar]&&(()=>{const car=s.cars[garageCar];const base=CARS.find(c=>c.id===car.carId);
      return(<div style={S.modalWrap} onClick={()=>setGarageCar(null)}><div style={S.modal} onClick={e=>e.stopPropagation()}>
        <div style={S.modalTitle}>{base.brand} {base.model}</div>
        <div style={S.modalCar}><CarSVG body={base.body} color={car.paint} big/></div>
        <div style={S.modalSub}>Цвет</div><div style={S.paintRow}>{PAINTS.map(c=><button key={c} onClick={()=>paintCar(garageCar,c)} style={{...S.paintDot,background:c,outline:car.paint===c?"2px solid #c9a227":"none"}}/>)}</div>
        <div style={S.modalSub}>Тюнинг</div>
        {UPGRADES.map(up=>{const has=car.upgrades.includes(up.id);const cost=Math.floor(base.cost*up.costMul);return(<div key={up.id} style={S.row}><div><div style={S.rowName}>{up.emoji} {up.name} {has&&"✓"}</div><div style={S.rowSub}>+{up.speed} скорости · {money(cost)}</div></div><button style={{...S.buyBtn,...(has?S.btnOwn:{}),...(s.cash<cost&&!has?S.btnLock:{})}} onClick={()=>!has&&upgradeCar(garageCar,up)} disabled={has}>{has?"есть":"ставить"}</button></div>);})}
        <button style={{...S.bigBtn,marginTop:14}} onClick={()=>setGarageCar(null)}>Закрыть</button>
      </div></div>);})()}

    {saveModal&&<SaveBox code={saveCode} setCode={setSaveCode} onImport={importSave} onClose={()=>setSaveModal(false)} mode="export" />}

    <div style={S.nav}>
      <NavBtn active={tab==="home"} onClick={()=>setTab("home")} emoji="🏠" label="Дом"/>
      <NavBtn active={tab==="career"} onClick={()=>setTab("career")} emoji="💼" label="Работа"/>
      <NavBtn active={tab==="biz"} onClick={()=>setTab("biz")} emoji="🏭" label="Империя"/>
      <NavBtn active={tab==="cars"} onClick={()=>setTab("cars")} emoji="🏎️" label="Гараж"/>
      <NavBtn active={tab==="money"} onClick={()=>setTab("money")} emoji="📈" label="Финансы"/>
      <NavBtn active={tab==="shop"} onClick={()=>setTab("shop")} emoji="🛍️" label="Покупки"/>
      <NavBtn active={tab==="love"} onClick={()=>setTab("love")} emoji="❤️" label="Личное"/>
      <NavBtn active={tab==="me"} onClick={()=>setTab("me")} emoji="👤" label="Я"/>
    </div>
  </div></div>);
}

function SaveBox({code,setCode,onImport,onClose,mode}){
  const copy=()=>{ navigator.clipboard?.writeText(code); };
  return (<div style={S.modalWrap} onClick={onClose}><div style={S.modal} onClick={e=>e.stopPropagation()}>
    <div style={S.modalTitle}>{mode==="export"?"Твой код сейва":"Загрузить сейв"}</div>
    <p style={{...S.tabHint,marginTop:10}}>{mode==="export"?"Скопируй код и вставь на другом телефоне или отправь другу.":"Вставь код сейва, чтобы продолжить игру."}</p>
    <textarea value={code} onChange={e=>setCode(e.target.value)} placeholder="Код сейва..." style={S.textarea} readOnly={mode==="export"} />
    {mode==="export"?<button style={S.bigBtn} onClick={copy}>📋 Копировать</button>:<button style={S.bigBtn} onClick={onImport}>Загрузить</button>}
    <button style={{...S.bigBtn,marginTop:10,background:"#24382e",color:gold}} onClick={onClose}>Закрыть</button>
  </div></div>);
}

function CarSVG({body,color,small,big}){
  const w=big?200:small?54:130; const dark=shade(color,-30);
  const shapes={
    bike:<g><rect x="30" y="34" width="40" height="8" rx="4" fill={color}/><circle cx="30" cy="52" r="9" fill="#222" stroke="#555" strokeWidth="2"/><circle cx="72" cy="52" r="9" fill="#222" stroke="#555" strokeWidth="2"/><rect x="46" y="22" width="6" height="16" fill={dark}/></g>,
    hatch:<g><path d="M18 46 L30 30 L70 30 L84 46 Z" fill={color}/><rect x="14" y="44" width="74" height="12" rx="4" fill={dark}/><rect x="34" y="33" width="30" height="12" rx="2" fill="#bcd4e6"/><circle cx="30" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/><circle cx="72" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/></g>,
    sedan:<g><path d="M14 46 L26 30 L74 30 L92 46 Z" fill={color}/><rect x="10" y="44" width="88" height="12" rx="4" fill={dark}/><rect x="30" y="33" width="42" height="11" rx="2" fill="#bcd4e6"/><circle cx="30" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/><circle cx="78" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/></g>,
    suv:<g><path d="M14 44 L22 26 L80 26 L94 44 Z" fill={color}/><rect x="10" y="42" width="88" height="16" rx="4" fill={dark}/><rect x="28" y="30" width="46" height="13" rx="2" fill="#bcd4e6"/><circle cx="30" cy="60" r="10" fill="#222" stroke="#888" strokeWidth="2"/><circle cx="78" cy="60" r="10" fill="#222" stroke="#888" strokeWidth="2"/></g>,
    sport:<g><path d="M10 48 L28 36 L48 28 L74 30 L96 48 Z" fill={color}/><rect x="8" y="46" width="92" height="10" rx="5" fill={dark}/><path d="M40 36 L66 33 L74 44 L38 44 Z" fill="#9fc0d8"/><circle cx="28" cy="58" r="9" fill="#222" stroke="#c9a227" strokeWidth="2"/><circle cx="80" cy="58" r="9" fill="#222" stroke="#c9a227" strokeWidth="2"/></g>,
    super:<g><path d="M6 50 L26 40 L50 30 L80 34 L102 50 Z" fill={color}/><rect x="4" y="48" width="100" height="8" rx="4" fill={dark}/><path d="M44 38 L72 36 L80 46 L40 46 Z" fill="#111"/><rect x="96" y="30" width="10" height="8" fill={dark}/><circle cx="26" cy="57" r="9" fill="#222" stroke="#c9a227" strokeWidth="2.5"/><circle cx="82" cy="57" r="9" fill="#222" stroke="#c9a227" strokeWidth="2.5"/></g>,
    f1:<g><rect x="6" y="46" width="98" height="7" rx="3" fill={color}/><path d="M30 46 L54 34 L64 34 L70 46 Z" fill={dark}/><rect x="2" y="40" width="16" height="4" fill={color}/><rect x="92" y="30" width="16" height="4" fill={color}/><circle cx="26" cy="56" r="10" fill="#111" stroke="#666" strokeWidth="3"/><circle cx="84" cy="56" r="10" fill="#111" stroke="#666" strokeWidth="3"/></g>,
    limo:<g><path d="M6 46 L18 32 L96 32 L104 46 Z" fill={color}/><rect x="3" y="44" width="104" height="12" rx="4" fill={dark}/><rect x="22" y="35" width="13" height="9" rx="2" fill="#bcd4e6"/><rect x="40" y="35" width="13" height="9" rx="2" fill="#bcd4e6"/><rect x="58" y="35" width="13" height="9" rx="2" fill="#bcd4e6"/><rect x="76" y="35" width="13" height="9" rx="2" fill="#bcd4e6"/><circle cx="24" cy="58" r="8" fill="#222" stroke="#c9a227" strokeWidth="2"/><circle cx="86" cy="58" r="8" fill="#222" stroke="#c9a227" strokeWidth="2"/></g>,
    van:<g><path d="M14 22 L66 22 L90 42 L90 48 L14 48 Z" fill={color}/><rect x="10" y="46" width="82" height="10" rx="4" fill={dark}/><rect x="20" y="27" width="20" height="15" rx="2" fill="#bcd4e6"/><rect x="70" y="30" width="14" height="11" rx="2" fill="#bcd4e6"/><circle cx="30" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/><circle cx="76" cy="58" r="9" fill="#222" stroke="#888" strokeWidth="2"/></g>,
    monster:<g><path d="M16 38 L26 22 L80 22 L94 38 Z" fill={color}/><rect x="12" y="34" width="84" height="12" rx="4" fill={dark}/><rect x="30" y="25" width="46" height="12" rx="2" fill="#bcd4e6"/><circle cx="30" cy="55" r="15" fill="#222" stroke="#666" strokeWidth="4"/><circle cx="82" cy="55" r="15" fill="#222" stroke="#666" strokeWidth="4"/></g>,
  };
  return <svg viewBox="0 0 110 72" width={w} height={w*0.65} style={{display:"block"}}>{shapes[body]}</svg>;
}
function shade(hex,amt){let c=hex.replace("#","");if(c.length===3)c=c.split("").map(x=>x+x).join("");const num=parseInt(c,16);let r=(num>>16)+amt,g=((num>>8)&255)+amt,b=(num&255)+amt;r=Math.max(0,Math.min(255,r));g=Math.max(0,Math.min(255,g));b=Math.max(0,Math.min(255,b));return"#"+((r<<16)|(g<<8)|b).toString(16).padStart(6,"0");}

function Stat({label,val,color}){return <div><div style={S.statTop}><span>{label}</span><span>{Math.round(val)}</span></div><div style={S.bar}><div style={{...S.barFill,width:val+"%",background:color}}/></div></div>;}
function SectionTitle({children}){return <div style={S.sectionTitle}>{children}</div>;}
function ActBtn({onClick,label,emoji,sub}){return <button style={S.actBtn} onClick={onClick}><div style={S.actEmoji}>{emoji}</div><div style={S.actLabel}>{label}</div><div style={S.actSub}>{sub}</div></button>;}
function NavBtn({active,onClick,emoji,label}){return <button style={{...S.navBtn,...(active?S.navActive:{})}} onClick={onClick}><div style={{fontSize:17}}>{emoji}</div><div style={S.navLabel}>{label}</div></button>;}
function SubTab({active,onClick,children}){return <button style={{...S.subTab,...(active?S.subTabOn:{})}} onClick={onClick}>{children}</button>;}
function ShopRow({item,owned,cash,onBuy,extra,btnTxt="купить",ownTxt="есть"}){return <div style={S.row}><div><div style={S.rowName}>{item.emoji} {item.name} {owned&&<span style={S.owned}>✓</span>}</div><div style={S.rowSub}>{money(item.cost)} · {extra}</div></div><button style={{...S.buyBtn,...(cash<item.cost?S.btnLock:{}),...(owned?S.btnOwn:{})}} onClick={()=>!owned&&onBuy()} disabled={owned}>{owned?ownTxt:btnTxt}</button></div>;}
function OwnBox({label,n,emoji}){return <div style={S.ownBox}><div style={{fontSize:22}}>{emoji}</div><div style={S.ownN}>{n}</div><div style={S.ownLbl}>{label}</div></div>;}

const gold="#c9a227";
const S={

  flash:{position:"absolute",top:60,left:"50%",transform:"translateX(-50%)",background:gold,color:"#111",padding:"9px 18px",borderRadius:30,fontSize:13,fontWeight:700,zIndex:60,boxShadow:"0 6px 20px rgba(0,0,0,.5)",maxWidth:"92%",textAlign:"center"},
  content:{flex:1,overflowY:"auto",padding:"4px 14px 100px"},

  tabHint:{fontSize:12.5,color:"#8ba295",margin:"0 4px 12px",lineHeight:1.4},
  actionGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9},

  owned:{color:gold,fontSize:11.5},
  buyBtn:{background:gold,color:"#0c1512",border:"none",borderRadius:18,padding:"7px 14px",fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"},
  miniBtn:{background:gold,color:"#0c1512",border:"none",borderRadius:10,padding:"8px 12px",fontSize:12.5,fontWeight:800,cursor:"pointer",minWidth:38},
  wideBtn:{background:gold,color:"#0c1512",border:"none",borderRadius:12,padding:"12px",fontSize:13,fontWeight:700,cursor:"pointer"},
  btnLock:{background:"#2a3830",color:"#5f7268",cursor:"not-allowed"},btnOwn:{background:"#24382e",color:gold},
  subTabs:{display:"flex",gap:6,marginTop:8},
  subTab:{flex:1,background:"#131f1a",border:"1px solid #24382e",borderRadius:10,padding:"9px 4px",fontSize:11.5,color:"#8ba295",cursor:"pointer",fontWeight:600},
  subTabOn:{background:"#1a251d",border:"1px solid "+gold,color:gold},
  garageGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:6},
  garageCard:{background:"#131f1a",border:"1px solid #24382e",borderRadius:14,padding:"12px 8px",cursor:"pointer",color:"#e8ede9",display:"flex",flexDirection:"column",alignItems:"center"},
  garageName:{fontSize:12,fontWeight:700,marginTop:6,textAlign:"center"},garageUp:{fontSize:11,color:gold,marginTop:3},
  ownGrid:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8},
  ownBox:{background:"#131f1a",border:"1px solid #1f2f27",borderRadius:13,padding:"13px 8px",textAlign:"center"},
  ownN:{fontSize:18,fontWeight:800,color:gold,marginTop:3},ownLbl:{fontSize:9.5,color:"#8ba295",marginTop:2},
  achGrid:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8},
  achBox:{background:"#131f1a",border:"1px solid #1f2f27",borderRadius:12,padding:"12px 6px",textAlign:"center"},
  achGot:{border:"1px solid "+gold,background:"#1a251d"},achLbl:{fontSize:9.5,marginTop:4,lineHeight:1.2},
  meHead:{display:"flex",alignItems:"center",gap:12,padding:"10px 4px"},
  meAvatar:{width:52,height:52,borderRadius:16,background:"#1a2b22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,border:"1px solid #24382e"},
  nav:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:460,display:"flex",background:"#0a120e",borderTop:"1px solid #1c2b23",padding:"6px 1px calc(6px + env(safe-area-inset-bottom))"},

  navActive:{color:gold},navLabel:{fontSize:8.5,marginTop:1},
  modalWrap:{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:50,display:"flex",alignItems:"flex-end",justifyContent:"center"},
  modal:{width:"100%",maxWidth:460,background:"#101d17",borderRadius:"20px 20px 0 0",padding:"20px 16px calc(20px + env(safe-area-inset-bottom))",maxHeight:"88vh",overflowY:"auto",border:"1px solid #24382e"},
  modalTitle:{fontSize:18,fontWeight:800,textAlign:"center",color:gold},
  modalCar:{display:"flex",justifyContent:"center",padding:"16px 0",background:"radial-gradient(circle,#1a2b22,transparent)",borderRadius:16,margin:"10px 0"},
  modalSub:{fontSize:11.5,textTransform:"uppercase",letterSpacing:1,color:"#8ba295",margin:"12px 4px 8px",fontWeight:700},
  paintRow:{display:"flex",flexWrap:"wrap",gap:9,padding:"0 4px 4px"},paintDot:{width:34,height:34,borderRadius:"50%",border:"1px solid #333",cursor:"pointer"},
  textarea:{width:"100%",boxSizing:"border-box",height:90,background:"#0c1512",border:"1px solid #24382e",borderRadius:12,padding:12,color:"#e8ede9",fontSize:11,marginBottom:12,resize:"none",fontFamily:"monospace"},
  startCard:{width:"100%",maxWidth:400,alignSelf:"center",margin:"auto",padding:28,textAlign:"center"},
  logo:{width:76,height:76,borderRadius:20,background:gold,color:"#0c1512",fontSize:40,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"},
  title:{fontSize:32,fontWeight:900,letterSpacing:4,margin:"0 0 6px"},sub:{fontSize:14,color:"#8ba295",margin:"0 0 22px"},
  input:{width:"100%",boxSizing:"border-box",background:"#131f1a",border:"1px solid #24382e",borderRadius:14,padding:"13px 15px",fontSize:15,color:"#e8ede9",marginBottom:14,outline:"none"},
  avatarPickRow:{display:"flex",flexWrap:"wrap",gap:6,justifyContent:"center",marginBottom:6},
  avatarChip:{width:40,height:40,borderRadius:12,background:"#131f1a",border:"1px solid #24382e",fontSize:20,cursor:"pointer"},
  avatarChipOn:{border:"2px solid "+gold,background:"#1a251d"},
  avatarLbl:{fontSize:12,color:"#8ba295",marginBottom:16},
  bigBtn:{width:"100%",background:gold,color:"#0c1512",border:"none",borderRadius:14,padding:"14px",fontSize:15,fontWeight:800,cursor:"pointer"},
  hint:{fontSize:11.5,color:"#647a6f",marginTop:16,lineHeight:1.5},
  statBig:{fontSize:28,fontWeight:800,color:gold,margin:"10px 0 4px"},
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
